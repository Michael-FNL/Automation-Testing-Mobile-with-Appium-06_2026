name: Android Appium CI (Sauce Labs + Mobitru)

# Adapted from "Build and test Android with Gitlab Continuous Integration"
# (https://medium.com/evenbit/build-and-test-android-with-gitlab-continuous-integration-e51aba6ba53e)
# using the same build -> test -> package pipeline structure, ported to GitHub Actions
# for a Java/Maven/Appium/Cucumber/TestNG project. Runs the same smoke suite against
# two independent device clouds in parallel: Sauce Labs and Mobitru.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch: {}

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Dmaven.repo.local=.m2/repository'

jobs:
  # ---------------------------------------------------------------------
  # STEP 1: Build — compile the project once, shared by both cloud jobs.
  # ---------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Compile project
        run: mvn -B clean compile test-compile

  # ---------------------------------------------------------------------
  # STEP 2a: Test on Sauce Labs
  # ---------------------------------------------------------------------
  test-saucelabs:
    name: Test on Sauce Labs
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run smoke suite against Sauce Labs
        env:
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          SAUCE_ACCESS_KEY: ${{ secrets.SAUCE_ACCESS_KEY }}
        run: |
          mvn -B clean test \
            -Dsuite=smokeTests/smoke \
            -Drunning.platform=saucelabs \
            -Dsauce.username="${SAUCE_USERNAME}" \
            -Dsauce.access.key="${SAUCE_ACCESS_KEY}" \
            -Dsauce.data.center=eu-central-1 \
            -Ddevice.name="Android GoogleAPI Emulator" \
            -Dplatform.version=11.0

      - name: Upload Sauce Labs reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-saucelabs
          path: |
            target/cucumber-reports
            target/surefire-reports
          retention-days: 4
          if-no-files-found: warn

  # ---------------------------------------------------------------------
  # STEP 2b: Test on Mobitru
  # ---------------------------------------------------------------------
  test-mobitru:
    name: Test on Mobitru
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run smoke suite against Mobitru
        env:
          MOBITRU_PROJECT_NAME: ${{ secrets.MOBITRU_PROJECT_NAME }}
          MOBITRU_AUTH_KEY: ${{ secrets.MOBITRU_AUTH_KEY }}
        run: |
          mvn -B clean test \
            -Dsuite=smokeTests/smoke \
            -Drunning.platform=epam_cloud \
            -Dmobitru.project.name="${MOBITRU_PROJECT_NAME}" \
            -Dmobitru.auth.key="${MOBITRU_AUTH_KEY}" \
            -Dplatform.version=11

      - name: Upload Mobitru reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-mobitru
          path: |
            target/cucumber-reports
            target/surefire-reports
          retention-days: 4
          if-no-files-found: warn

  # ---------------------------------------------------------------------
  # STEP 3: Package — zip reports from both clouds into one bundle.
  # Runs regardless of whether either test job passed or failed.
  # ---------------------------------------------------------------------
  package:
    name: Package reports
    runs-on: ubuntu-latest
    needs: [ test-saucelabs, test-mobitru ]
    if: always()
    steps:
      - name: Download Sauce Labs reports
        uses: actions/download-artifact@v4
        with:
          name: test-reports-saucelabs
          path: reports/saucelabs
        continue-on-error: true

      - name: Download Mobitru reports
        uses: actions/download-artifact@v4
        with:
          name: test-reports-mobitru
          path: reports/mobitru
        continue-on-error: true

      - name: Add build info file
        run: |
          {
            echo "commit: ${{ github.sha }}"
            echo "branch: ${{ github.ref_name }}"
            echo "run_id: ${{ github.run_id }}"
            echo "triggered_by: ${{ github.actor }}"
            echo "date: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "sauce_labs_result: ${{ needs.test-saucelabs.result }}"
            echo "mobitru_result: ${{ needs.test-mobitru.result }}"
          } > reports/build-info.txt

      - name: Zip report bundle
        run: |
          cd reports
          zip -r ../smoke-test-report-${{ github.run_number }}.zip .

      - name: Set retention days by branch
        id: retention
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "days=30" >> "$GITHUB_OUTPUT"
          else
            echo "days=3" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload packaged report
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report-${{ github.run_number }}
          path: smoke-test-report-${{ github.run_number }}.zip
          retention-days: ${{ steps.retention.outputs.days }}